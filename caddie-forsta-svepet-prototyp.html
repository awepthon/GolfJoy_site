<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hämta din personliga caddie | Golf Joy</title>
<meta name="theme-color" content="#2C5545">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Caddie">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,900;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--paper:#F4F1E9;--ink:#1C2C24;--pine:#2C5545;--sea:#12706B;--sun:#C0862C;--stone:#7C7666;--line:rgba(28,44,36,.14)}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font-family:Inter,system-ui,sans-serif;font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3,.display{font-family:Fraunces,Georgia,serif;letter-spacing:-.01em}
.app{max-width:760px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* ---------- POSTER ---------- */
.poster{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:26px 20px;
  background:radial-gradient(120% 80% at 80% -10%,rgba(18,112,107,.28),transparent 55%),
   radial-gradient(90% 70% at 0% 110%,rgba(44,85,69,.4),transparent 60%),
   linear-gradient(180deg,#20423a,#2C5545 65%,#356149)}
.sign{max-width:420px;width:100%;text-align:center;color:#F4F1E9}
.sign .brand{font-family:Fraunces;font-weight:600;font-size:26px}
.sign .brand small{display:block;font-family:Inter;font-weight:600;font-size:10px;letter-spacing:.28em;color:#E7C98B;margin-top:2px}
.sign h1{font-size:clamp(34px,8vw,52px);font-weight:600;color:#FCFAF3;margin:26px 0 8px;line-height:1.05}
.sign .sub{font-family:Fraunces;font-style:italic;font-size:18px;color:#E9E4D6;margin-bottom:24px}
.qrcard{background:#fff;border-radius:22px;padding:20px;max-width:280px;margin:0 auto;box-shadow:0 24px 60px -24px rgba(0,0,0,.6)}
.qrcard svg{width:100%;height:auto;display:block}
.qrcard .url{margin-top:12px;font-size:13px;color:var(--stone);font-weight:600;letter-spacing:.02em}
.sign .hint{margin-top:18px;font-size:13.5px;color:#cfe0d6}
.sweep{margin-top:22px;background:var(--sun);color:#fff;border:0;border-radius:999px;padding:14px 26px;font:inherit;font-size:15px;font-weight:600;cursor:pointer}
.sweep small{display:block;font-weight:400;font-size:11px;opacity:.85;margin-top:1px}

/* ---------- APP ---------- */
.hide{display:none!important}
.top{position:sticky;top:0;z-index:6;background:linear-gradient(180deg,#25453b,#2C5545);color:#F4F1E9;padding:14px 18px;display:flex;align-items:center;gap:12px;box-shadow:0 10px 26px -20px rgba(0,0,0,.7)}
.avatar{width:40px;height:40px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#3f7a63,#1c7a6f);display:flex;align-items:center;justify-content:center;font-size:20px}
.who b{font-family:Fraunces;font-weight:600;font-size:18px;display:block;line-height:1.05}
.who small{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:#E7C98B}
.funnel{margin-left:auto;font-size:10px;letter-spacing:.06em;color:#9fbcae;text-transform:uppercase;font-weight:600}
.funnel b{color:#F4E9CE}
.thread{flex:1;padding:20px 16px 8px;overflow-y:auto}
.msg{display:flex;margin:11px 0;animation:rise .4s ease both}.msg.me{justify-content:flex-end}
.bubble{max-width:86%;padding:12px 15px;border-radius:18px}
.bot .bubble{background:#fff;border:1px solid var(--line);border-bottom-left-radius:6px}
.me .bubble{background:var(--pine);color:#F4F1E9;border-bottom-right-radius:6px}
.bubble p{margin:0 0 8px}.bubble p:last-child{margin:0}
.bubble .lead{font-family:Fraunces;font-size:18px;line-height:1.3}
.tip{background:#fffdf5;border:1px solid rgba(192,134,44,.4);border-radius:12px;padding:11px 13px;margin-top:8px}
.tip .k{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--sun);font-weight:600}.tip p{margin:4px 0 0;font-size:14px}
@keyframes rise{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:none}}
.chips{display:flex;flex-wrap:wrap;gap:9px;padding:4px 16px 2px}
.chip{border:1px solid var(--pine);color:var(--pine);background:#fff;border-radius:999px;padding:11px 15px;font:inherit;font-size:14px;font-weight:500;cursor:pointer;transition:.15s}
.chip:hover{background:var(--pine);color:#fff}.chip.go{background:var(--sun);border-color:var(--sun);color:#fff}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 14px 34px -24px rgba(28,44,36,.45);margin:8px 0;overflow:hidden;animation:rise .45s ease both}
.card .hd{padding:13px 16px 6px}.card .hd h3{margin:0;font-size:18px}.card .hd .sub{font-size:12.5px;color:var(--stone)}
.card .bd{padding:4px 16px 15px}
.field{margin:9px 0}.field label{display:block;font-size:12px;font-weight:600;color:var(--pine);margin-bottom:4px}
.field input{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font:inherit;font-size:15px;background:#fbfaf6}
.two{display:flex;gap:10px}.two .field{flex:1}
.consent{display:flex;gap:9px;align-items:flex-start;font-size:12.5px;color:var(--stone);background:#fffdf7;border:1px dashed rgba(192,134,44,.4);border-radius:10px;padding:10px 12px;margin-top:6px}
.consent input{margin-top:3px}
.btnrow{display:flex;gap:8px;margin-top:11px}.btnrow button{flex:1;border:0;border-radius:999px;padding:12px;font:inherit;font-size:14px;font-weight:600;cursor:pointer}
.b-primary{background:var(--sun);color:#fff}.b-ghost{background:#fff;border:1px solid var(--line)!important;color:var(--pine)}
@media(prefers-reduced-motion:reduce){.msg,.card{animation:none}}
</style>
</head>
<body>

<!-- ============ POSTER (vad kunden ser i verkligheten) ============ -->
<div class="poster" id="poster">
  <div class="sign">
    <div class="brand">Golf Joy<small>EN VÄRLD AV GOLF</small></div>
    <h1>Hämta din personliga caddie</h1>
    <div class="sub">Med dig hela vägen — från dröm till första tee.</div>
    <div class="qrcard">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=10&color=1C2C24&bgcolor=ffffff&data=https%3A%2F%2Fgolfjoy.se%2Fcaddie" width="240" height="240" alt="QR-kod till golfjoy.se/caddie" style="display:block;width:100%;height:auto;border-radius:8px">
      <div class="url">golfjoy.se/caddie</div>
    </div>
    <div class="hint">Svep med mobilkameran · ingen app att ladda ner</div>
    <button class="sweep" id="sweep">▶ Svep (demo)<small>öppnar caddien</small></button>
  </div>
</div>

<!-- ============ APP (efter svepet) ============ -->
<div class="app hide" id="app">
  <div class="top">
    <div class="avatar">🏌️</div>
    <div class="who"><b>Caddie</b><small>En värld av golf</small></div>
    <div class="funnel" id="funnel">Steg: <b>drömmare</b></div>
  </div>
  <div class="thread" id="thread"></div>
</div>

<script>
const sess={};
const mem={async get(k){try{if(window.storage){const r=await window.storage.get('sw_'+k);return r?r.value:null;}}catch(e){}try{return localStorage.getItem('sw_'+k);}catch(e){}return sess[k]??null;},
 async set(k,v){try{if(window.storage){await window.storage.set('sw_'+k,v);return;}}catch(e){}try{localStorage.setItem('sw_'+k,v);return;}catch(e){}sess[k]=v;}};

const thread=document.getElementById('thread');
let S={when:null};
function scroll(){thread.scrollTop=thread.scrollHeight;}
function bubble(h,who='bot'){const m=document.createElement('div');m.className='msg '+who;m.innerHTML=`<div class="bubble">${h}</div>`;thread.appendChild(m);scroll();return m;}
function typing(cb,d=650){const m=document.createElement('div');m.className='msg bot';m.innerHTML='<div class="bubble"><span style="opacity:.4">•••</span></div>';thread.appendChild(m);scroll();setTimeout(()=>{m.remove();cb();},d);}
function chips(list){const r=document.createElement('div');r.className='chips';list.forEach(c=>{const b=document.createElement('button');b.className='chip'+(c.cls?' '+c.cls:'');b.textContent=c.label;b.onclick=()=>c.on(b);r.appendChild(b);});thread.appendChild(r);scroll();return r;}
function setFunnel(t){document.getElementById('funnel').innerHTML='Steg: <b>'+t+'</b>';}

document.getElementById('sweep').onclick=async()=>{
  document.getElementById('poster').classList.add('hide');
  document.getElementById('app').classList.remove('hide');
  const member=await mem.get('member');
  if(member){const p=JSON.parse(member);setFunnel('medlem');
    typing(()=>{bubble(`<p class="lead">Välkommen tillbaka, ${p.name}! ◆</p><p>Kul att se dig igen. Ska vi ta upp Costa Brava-tråden, eller drömma om något nytt?</p>`);
      chips([{label:'Fortsätt drömma',cls:'go',on:()=>welcome(true)}]);},500);}
  else welcome(false);
};

function welcome(returning){setFunnel('drömmare');
  typing(()=>{
    bubble(`<p class="lead">Hej! Jag är din personliga caddie. 🌿</p>
      <p>Ingen inloggning, inga formulär — bara du och jag. Just nu kan jag <b>Costa Brava</b> utan och innan. Ska vi drömma ihop en resa?</p>`);
    chips([{label:'Ja, ta med mig!',cls:'go',on:()=>askWhen()},{label:'Bara nyfiken',on:()=>askWhen()}]);
  },500);
}
function askWhen(){bubble('Ja, ta med mig!','me');
  typing(()=>{bubble(`<p>Vad härligt. Bara en känsla först — <b>när</b> lockar det?</p>`);
    chips([{label:'I vår',on:()=>teaser('vår')},{label:'I höst',on:()=>teaser('höst')},{label:'Vet inte än',on:()=>teaser('oklar')}]);},550);}
function teaser(w){S.when=w;bubble({vår:'I vår',höst:'I höst',oklar:'Vet inte än'}[w],'me');
  typing(()=>{
    bubble(`<p>Då ska du få smaka på varför vi älskar det här stället. ✨</p>`);
    typing(()=>{
      bubble(`<p><b>Empordà</b> — två banor av helt olika karaktär. Links har greener så snabba att bollen inte stannar förrän den slutar rulla. Du bor mellan banorna, med kök av en kock som kommer från El Bulli.</p>
        <div class="tip"><div class="k">◆ Visste du att…</div><p>Regionen är Salvador Dalís födelsebygd? Dalí-museet i Figueres ligger en kort körning bort — golf på förmiddagen, surrealism på eftermiddagen.</p></div>`);
      typing(()=>valueMoment(),800);
    },900);
  },700);
}
function valueMoment(){
  bubble(`<p>Det här är bara början — jag kan bygga hela din vecka, matcha banor mot ditt spel och koppla ihop dig med andra resenärer.</p>
    <p class="lead">Ska jag spara din resa och minnas dig till nästa gång?</p>
    <p>Bli medlem i <b>En värld av golf</b> — gratis. Då kan jag också koppla ihop dig tryggt med andra och du kan läsa &amp; skriva i resenärernas bok.</p>`);
  chips([{label:'Ja, bli medlem',cls:'go',on:()=>joinForm()},{label:'Inte nu, drömma vidare',on:()=>notNow()}]);
}
function notNow(){bubble('Inte nu','me');
  typing(()=>{bubble(`<p>Självklart — drömma och planera fritt så länge. Jag finns här, och frågan står kvar när du vill spara det. 🌿</p>`);
    chips([{label:'Okej, bli medlem ändå',cls:'go',on:()=>joinForm()}]);},550);}
function joinForm(){bubble('Ja, bli medlem','me');setFunnel('blir medlem…');
  typing(()=>{
    const el=document.createElement('div');el.className='msg bot';
    el.innerHTML=`<div class="bubble" style="max-width:94%;padding:0;background:transparent;border:0">
      <div class="card"><div class="hd"><h3>Bli medlem</h3><div class="sub">Gratis · tar 15 sekunder · du väljer vad som visas</div></div>
      <div class="bd">
        <div class="field"><label>Vad ska jag kalla dig?</label><input id="j-name" placeholder="Förnamn"></div>
        <div class="two"><div class="field"><label>Hcp (valfritt)</label><input id="j-hcp" placeholder="t.ex. 18"></div>
          <div class="field"><label>Hemmaklubb (valfritt)</label><input id="j-club" placeholder="t.ex. Halmstad GK"></div></div>
        <label class="consent"><input type="checkbox" id="j-consent"><span>Jag godkänner att min profil används för att minnas mig och ge personliga förslag. Jag kan när som helst gå ur. (GDPR)</span></label>
        <div class="btnrow"><button class="b-ghost" id="j-skip">Avbryt</button><button class="b-primary" id="j-go">Bli medlem</button></div>
      </div></div></div>`;
    thread.appendChild(el);scroll();
    el.querySelector('#j-skip').onclick=()=>{el.remove();notNow();};
    el.querySelector('#j-go').onclick=async()=>{
      const name=el.querySelector('#j-name').value.trim();
      if(!name){el.querySelector('#j-name').focus();return;}
      if(!el.querySelector('#j-consent').checked){el.querySelector('.consent').style.color='#b3541e';return;}
      const p={name,hcp:el.querySelector('#j-hcp').value.trim(),club:el.querySelector('#j-club').value.trim()};
      await mem.set('member',JSON.stringify(p));welcomeMember(p);
    };
  },600);
}
function welcomeMember(p){setFunnel('medlem');bubble('Bli medlem','me');
  typing(()=>{
    bubble(`<p class="lead">Välkommen till klubben, ${p.name}! ◆</p>
      <p>Din resa är sparad, och jag minns dig nu${p.hcp?(' – hcp '+p.hcp):''}. Nästa gång du sveper QR-koden känner jag igen dig och börjar där vi slutade.</p>
      <div class="tip"><div class="k">◆ Nu är det här öppet för dig</div><p>Bygga hela resan, gå med i en avgång med andra resenärer, och läsa &amp; skriva i resenärernas bok.</p></div>
      <p>Ska vi fortsätta forma din Costa Brava-vecka?</p>`);
    chips([{label:'Ja, bygg min resa',cls:'go',on:()=>bubble('<p>Härligt — då kör vi. 🌿 (Här skulle planeraren ta vid.)</p>')}]);
  },700);
}
</script>
</body>
</html>
