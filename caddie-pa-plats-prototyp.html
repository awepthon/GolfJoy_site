<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Caddie på plats – en resedag | Golf Joy</title>
<meta name="theme-color" content="#2C5545">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Caddie">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--paper:#F4F1E9;--ink:#1C2C24;--pine:#2C5545;--sea:#12706B;--sun:#C0862C;--stone:#7C7666;--line:rgba(28,44,36,.14)}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font-family:Inter,system-ui,sans-serif;font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3,.display{font-family:Fraunces,Georgia,serif;letter-spacing:-.01em}
.app{max-width:760px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
/* header */
.top{position:sticky;top:0;z-index:8;background:linear-gradient(180deg,#25453b,#2C5545);color:#F4F1E9;padding:14px 18px 0;box-shadow:0 10px 26px -20px rgba(0,0,0,.7)}
.trow{display:flex;align-items:center;gap:12px}
.avatar{width:40px;height:40px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#3f7a63,#1c7a6f);display:flex;align-items:center;justify-content:center;font-size:20px}
.who b{font-family:Fraunces;font-weight:600;font-size:18px;display:block;line-height:1.05}
.who small{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:#E7C98B}
.day{margin-left:auto;text-align:right;font-size:12px;color:#cfe0d6}
.day b{display:block;font-family:Fraunces;font-size:15px;color:#F4E9CE}
.segs{display:flex;gap:4px;margin-top:12px}
.seg{flex:1;text-align:center;padding:10px 0;font-size:13px;font-weight:600;color:#9fbcae;border-bottom:2px solid rgba(255,255,255,.15);cursor:pointer;transition:.2s;background:none;border-top:0;border-left:0;border-right:0;font-family:inherit}
.seg.on{color:#F4E9CE;border-color:var(--sun)}
/* body */
.wrap{flex:1;padding:16px 16px 28px}
.caddie{display:flex;gap:10px;margin:6px 0 14px;animation:rise .4s ease both}
.caddie .cav{flex:none;width:32px;height:32px;border-radius:50%;background:var(--pine);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px}
.caddie .bub{background:#fff;border:1px solid var(--line);border-radius:16px;border-top-left-radius:5px;padding:11px 14px;box-shadow:0 1px 2px rgba(28,44,36,.05)}
.caddie .bub .lead{font-family:Fraunces;font-size:17px;line-height:1.3}
.caddie .bub p{margin:0 0 7px}.caddie .bub p:last-child{margin:0}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 12px 30px -22px rgba(28,44,36,.4);margin:12px 0;overflow:hidden;animation:rise .45s ease both}
.card .hd{display:flex;align-items:center;gap:10px;padding:13px 16px 8px}
.card .hd .ic{width:30px;height:30px;border-radius:8px;background:#eef3ef;color:var(--pine);display:flex;align-items:center;justify-content:center;font-size:15px}
.card .hd h3{margin:0;font-size:17px}
.card .hd .k{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--sea);font-weight:600}
.card .bd{padding:2px 16px 15px}
.tip{background:#fffdf5;border:1px solid rgba(192,134,44,.4);border-radius:12px;padding:11px 13px;margin:8px 0 0}
.tip .k{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--sun);font-weight:600}
.tip p{margin:4px 0 0;font-size:14.5px}
.wx{display:flex;align-items:center;gap:14px}
.wx .big{font-family:Fraunces;font-size:40px;font-weight:600;line-height:1}
.wx .det{font-size:13.5px;color:var(--stone)}
.planb{margin-top:10px;font-size:14px;background:#eef3ef;border-radius:10px;padding:10px 12px;display:none}
.planb.show{display:block}
.people{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.person{display:flex;align-items:center;gap:10px;background:#faf8f2;border:1px solid var(--line);border-radius:12px;padding:8px 10px}
.pav{width:30px;height:30px;border-radius:50%;background:var(--pine);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
.person .nm{font-size:14px;font-weight:600}.person .m{font-size:12px;color:var(--stone)}
.btn{border:0;border-radius:999px;padding:9px 14px;font:inherit;font-size:13.5px;font-weight:600;cursor:pointer;background:var(--sun);color:#fff}
.btn.ghost{background:#fff;border:1px solid var(--pine);color:var(--pine)}
.btn.mini{margin-left:auto;padding:8px 13px}
.btn.wide{width:100%;margin-top:10px;padding:12px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.pchip{font-size:13px;border:1px solid var(--line);border-radius:999px;padding:8px 13px;background:#fff;cursor:pointer}
.pchip:hover{border-color:var(--pine)}
.done{color:var(--sea);font-size:13.5px;font-weight:600;margin-top:8px;display:none}
.done.show{display:block}
/* book */
.entry{padding:11px 0;border-bottom:1px solid var(--line)}.entry:last-child{border:0}
.entry .meta{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.eav{width:24px;height:24px;border-radius:50%;background:var(--pine);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.entry .nm{font-weight:600;font-size:13.5px}.entry .hc{font-size:12px;color:var(--stone)}
.entry .txt{font-family:Fraunces;font-style:italic;font-size:15px;color:#2a382f}
textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font:inherit;font-size:14.5px;background:#fbfaf6;min-height:52px;resize:vertical;margin-top:8px}
@keyframes rise{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:none}}
.a2hs{position:fixed;left:12px;right:12px;bottom:12px;max-width:736px;margin:0 auto;z-index:20;background:#1C2C24;color:#F4F1E9;border-radius:14px;padding:11px 12px;display:flex;align-items:center;gap:11px;box-shadow:0 16px 40px -16px rgba(0,0,0,.6);animation:rise .5s ease both}
.a2hs .ico{width:34px;height:34px;border-radius:9px;background:linear-gradient(150deg,#3f7a63,#12706B);display:flex;align-items:center;justify-content:center;font-size:18px;flex:none}
.a2hs .t{font-size:13px;line-height:1.35}.a2hs .t b{font-family:Fraunces}
.a2hs .x{margin-left:auto;background:rgba(255,255,255,.14);border:0;color:#dfe8e2;width:28px;height:28px;border-radius:50%;font-size:15px;cursor:pointer;flex:none}
@media(prefers-reduced-motion:reduce){.caddie,.card{animation:none}}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="trow">
      <div class="avatar">🏌️</div>
      <div class="who"><b>Caddie</b><small>På plats</small></div>
      <div class="day"><b>Torsdag</b>Empordà · dag 4 av 7</div>
    </div>
    <div class="segs">
      <button class="seg on" data-s="morgon">☀︎ Morgon</button>
      <button class="seg" data-s="bana">⛳ På banan</button>
      <button class="seg" data-s="kvall">🌙 Kväll</button>
    </div>
  </div>
  <div class="wrap" id="wrap"></div>
</div>

<script>
const sess={};
const mem={async get(k){try{if(window.storage){const r=await window.storage.get('cp_'+k);return r?r.value:null;}}catch(e){}try{return localStorage.getItem('cp_'+k);}catch(e){}return sess[k]??null;},
 async set(k,v){try{if(window.storage){await window.storage.set('cp_'+k,v);return;}}catch(e){}try{localStorage.setItem('cp_'+k,v);return;}catch(e){}sess[k]=v;}};

const wrap=document.getElementById('wrap');
const PROFILE={name:'Annette',hc:'hcp 18'};
const BOOKSEED=[
 {nm:'Anders',hc:'hcp 14',txt:'Empordà Links snabbaste greener jag spelat – underskatta dem inte!'},
];

document.querySelectorAll('.seg').forEach(s=>s.onclick=()=>{
  document.querySelectorAll('.seg').forEach(x=>x.classList.remove('on'));s.classList.add('on');render(s.dataset.s);});

function caddie(html){return `<div class="caddie"><div class="cav">🏌️</div><div class="bub">${html}</div></div>`;}

function render(seg){
  wrap.style.opacity=0;
  setTimeout(()=>{ wrap.innerHTML = ({morgon:morgon,bana:bana,kvall:kvall}[seg])(); wrap.style.opacity=1; bind(seg);},120);
}
wrap.style.transition='opacity .18s ease';

function morgon(){return caddie(`<p class="lead">God morgon, Annette! ☀️</p>
  <p>Idag väntar <b>Empordà</b>. Utslag <b>10:20</b> — jag har allt förberett. Här är din morgon.</p>`)
 +`<div class="card"><div class="hd"><div class="ic">🌤️</div><div><div class="k">Vädret idag</div><h3>Empordà</h3></div></div>
    <div class="bd"><div class="wx"><div class="big">23°</div><div class="det">Sol på förmiddagen · risk för skur 16–18 · lätt bris från havet</div></div>
      <button class="btn ghost" id="planbtn" style="margin-top:12px">Behöver jag en plan B?</button>
      <div class="planb" id="planb">☔ Ta rundan enligt plan — skuren kommer först sent. Skulle den tidigareläggas: <b>Dalí-museet i Figueres</b> ligger 35 min bort och är perfekt en regnig eftermiddag. Vill du att jag håller koll och pingar dig?</div>
    </div></div>`
 +`<div class="card"><div class="hd"><div class="ic">📖</div><div><div class="k">Morgonens greenläsning</div><h3>Empordà Links</h3></div></div>
    <div class="bd">
      <div class="tip"><div class="k">◆ Caddie-tips</div><p>Greenerna är så snabba att bollen inte stannar förrän den slutar rulla. Sikta <b>under hålet</b> och putta defensivt — särskilt på de stora greenerna på back nine. Lämna dig aldrig ovanför flaggan.</p></div>
      <div class="tip" style="margin-top:8px"><div class="k">◆ Lokalt</div><p>Mycket vatten och sanddyner i spel. Ta en klubba mer in mot de bevakade greenerna, och håll bollen på fairway — von Hagge straffar sidled.</p></div>
    </div></div>`
 +`<div class="card"><div class="hd"><div class="ic">👥</div><div><div class="k">Spelar Empordà idag</div><h3>Fyll bollen?</h3></div></div>
    <div class="bd"><p style="font-size:14px;color:var(--stone);margin:2px 0 8px">Två andra Golf Joy-medlemmar spelar här idag — samma nivå som du.</p>
      <div class="people">
        <div class="person"><span class="pav">E</span><div><div class="nm">Erik</div><div class="m">hcp 18 · gillar vin</div></div><button class="btn mini" data-fill="Erik">Spela ihop</button></div>
        <div class="person"><span class="pav">M</span><div><div class="nm">Marie</div><div class="m">hcp 22 · konst & mat</div></div><button class="btn mini" data-fill="Marie">Spela ihop</button></div>
      </div>
      <div class="done" id="filldone"></div>
    </div></div>`
 +`<div class="card"><div class="hd"><div class="ic">🧭</div><div><div class="k">Det praktiska</div><h3>Nära till hands</h3></div></div>
    <div class="bd"><div class="chips">
      <span class="pchip" data-info="uber">🚗 Uber till Empordà</span>
      <span class="pchip" data-info="apotek">➕ Närmaste apotek</span>
      <span class="pchip" data-info="smultron">🍓 Smultronstället</span>
      <span class="pchip" data-info="flyg">✈︎ Kolla hemresans flygtid</span>
    </div><div class="done" id="pracdone"></div></div></div>`;
}
function bana(){return caddie(`<p class="lead">Ha en härlig rond! ⛳</p>
  <p>Jag följer med hål för hål. Toppa upp här när du vill ha nästa tips.</p>`)
 +`<div class="card"><div class="hd"><div class="ic">🚩</div><div><div class="k">Hål 7 · par 3</div><h3>Över vattnet</h3></div></div>
    <div class="bd"><div class="tip"><div class="k">◆ Caddie-tips</div><p>Vattnet framför greenen lurar ögat — det är längre än det ser ut. Ta klubban som når <b>bakkant</b>, sikta på mitten. Missa hellre långt än kort.</p></div></div></div>`
 +`<div class="card"><div class="hd"><div class="ic">💧</div><div><div class="k">Back nine</div><h3>De snabba greenerna</h3></div></div>
    <div class="bd"><div class="tip"><div class="k">◆ Läsning</div><p>Från och med hål 13 lutar greenerna mot havet — mer break än du tror åt det hållet. Lämna putten under hålet så slipper du treputtar.</p></div>
    <button class="btn wide" id="wxcheck">☔ Hur ser vädret ut nu?</button><div class="done" id="wxnow"></div></div></div>`
 +`<div class="card"><div class="hd"><div class="ic">🍺</div><div><div class="k">Efter nio</div><h3>En paus?</h3></div></div>
    <div class="bd"><p style="font-size:14.5px;margin:2px 0 0">Klubbhuset vid vändningen har kall cava och pa amb tomàquet. Vill du att jag hälsar Erik och Marie att ni ses där?</p>
    <button class="btn wide" id="halsa">Hälsa gänget</button><div class="done" id="halsadone"></div></div></div>`;
}
function kvall(){return caddie(`<p class="lead">Vilken rond! 🌙</p>
  <p>Nu förtjänar ni en fin kväll. Här är mina tips — och glöm inte att fånga minnet.</p>`)
 +`<div class="card"><div class="hd"><div class="ic">🍽️</div><div><div class="k">Kvällens bord</div><h3>Middag på hotellet</h3></div></div>
    <div class="bd"><p style="font-size:14.5px;margin:2px 0 8px">Ni bor på <b>Doubletree Empordà</b> ikväll — kocken <b>Guillem Lama</b> kommer från El Bulli. Avsmakningsmenyn med lokala råvaror är i toppklass. Ska jag boka bord kl 20 för er tre?</p>
      <button class="btn wide" id="bokabord">Boka bord kl 20</button><div class="done" id="borddone"></div></div></div>`
 +`<div class="card"><div class="hd"><div class="ic">📷</div><div><div class="k">Fånga minnet</div><h3>Din reseberättelse</h3></div></div>
    <div class="bd"><p style="font-size:14px;color:var(--stone);margin:2px 0 6px">Spara en rad från dagens rond — den blir din berättelse, och nästa resenärs inspiration.</p>
      <textarea id="memtxt" placeholder="Idag på Empordà…"></textarea>
      <button class="btn wide" id="savemem">Spara till min resa</button><div class="done" id="memdone"></div></div></div>`
 +`<div class="card"><div class="hd"><div class="ic">📖</div><div><div class="k">Resenärernas bok</div><h3>Lämna ett tips</h3></div></div>
    <div class="bd" id="bookbd"></div></div>`;
}

async function bind(seg){
  if(seg==='morgon'){
    document.getElementById('planbtn').onclick=e=>{document.getElementById('planb').classList.add('show');e.target.style.display='none';};
    document.querySelectorAll('[data-fill]').forEach(b=>b.onclick=()=>{const n=b.dataset.fill;b.textContent='✓ Inbjuden';b.style.background='var(--sea)';
      const d=document.getElementById('filldone');d.textContent=`Jag har frågat ${n} om ni spelar ihop 10:20 — pingar dig när svaret kommer. 🤝`;d.classList.add('show');});
    const info={uber:'Bil på 6 min till Empordàs klubbhus — vill du att jag beställer till 09:40?',apotek:'Farmàcia i Torroella de Montgrí, 12 min bort, öppet till 20:30.',smultron:'Lokaltipset: bodegan i Peratallada efter rundan — pytteliten by, medeltida gränder, magisk. Boka tidigt.',flyg:'Hemresan söndag: BCN 14:05, incheckning öppnar 11:00 — jag påminner dig i god tid och kollar om tiden ändras.'};
    document.querySelectorAll('[data-info]').forEach(c=>c.onclick=()=>{const d=document.getElementById('pracdone');d.textContent=info[c.dataset.info];d.classList.add('show');});
  }
  if(seg==='bana'){
    document.getElementById('wxcheck').onclick=e=>{const d=document.getElementById('wxnow');d.textContent='Fortfarande torrt — skuren har skjutits till ikväll. Spela på i lugn och ro. 🌤️';d.classList.add('show');e.target.style.display='none';};
    document.getElementById('halsa').onclick=e=>{const d=document.getElementById('halsadone');d.textContent='Sagt och klart — Erik och Marie ses vid klubbhuset efter nio. 🍺';d.classList.add('show');e.target.style.display='none';};
  }
  if(seg==='kvall'){
    document.getElementById('bokabord').onclick=e=>{const d=document.getElementById('borddone');d.textContent='Bord för tre kl 20 är bokat på Doubletree Empordà. Smaklig måltid! 🍽️';d.classList.add('show');e.target.style.display='none';};
    document.getElementById('savemem').onclick=async e=>{const t=document.getElementById('memtxt').value.trim();if(!t)return;
      await mem.set('memory',t);const d=document.getElementById('memdone');d.textContent='Sparat i din reseberättelse. Den väntar när du kommer hem — och blir nästa års inspiration. 🌿';d.classList.add('show');};
    // book
    const bd=document.getElementById('bookbd');
    const saved=JSON.parse(await mem.get('entries')||'[]');
    const list=[...BOOKSEED,...saved];
    bd.innerHTML=list.map(en=>`<div class="entry"><div class="meta"><span class="eav">${en.nm[0]}</span><span class="nm">${en.nm}</span><span class="hc">${en.hc}</span></div><div class="txt">”${en.txt}”</div></div>`).join('')
      +`<textarea id="bookin" placeholder="Ditt tips till nästa resenär…"></textarea><button class="btn wide" id="bookpost">Lägg i boken (som medlem)</button><div class="done" id="bookdone"></div>`;
    document.getElementById('bookpost').onclick=async()=>{const t=document.getElementById('bookin').value.trim();if(!t)return;
      const s=JSON.parse(await mem.get('entries')||'[]');s.push({nm:PROFILE.name,hc:PROFILE.hc,txt:t});await mem.set('entries',JSON.stringify(s));
      render('kvall');};
  }
}
render('morgon');

/* app-feel: lägg till på hemskärmen (demonstrerar PWA-känslan) */
(function(){
  const bar=document.createElement('div');bar.className='a2hs';
  bar.innerHTML=`<div class="ico">🏌️</div><div class="t"><b>Lägg till Caddie på hemskärmen</b><br>Känns som en app · ingen nedladdning</div><button class="x" aria-label="Stäng">✕</button>`;
  document.body.appendChild(bar);
  bar.querySelector('.x').onclick=()=>bar.remove();
})();
</script>
</body>
</html>
